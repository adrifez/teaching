<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejemplo 05 - Formulario y preventDefault</title>
</head>
<body>
  <h1>Formulario sin recargar la página</h1>
  <p>Si envías un formulario normalmente, la página se recarga. Con <code>preventDefault()</code> evitamos eso y manejamos el envío con JavaScript.</p>
  <form id="formulario">
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre" required />
    <button type="submit">Enviar</button>
  </form>
  <p id="resultado"></p>

  <script src="script.js"></script>
</body>
</html>
