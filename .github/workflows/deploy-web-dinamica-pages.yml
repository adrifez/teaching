# Deploy the static site in projects/supporting_materials/web_dinamica/final to GitHub Pages.
# The contents of that folder are copied to the artifact root so index.html is the site homepage.
#
# One-time setup: In the repo, go to Settings → Pages → Build and deployment → Source
# and set it to "GitHub Actions". The site will be at https://<owner>.github.io/<repo>/

name: Deploy web_dinamica final to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'projects/supporting_materials/web_dinamica/final/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare artifact (copy final to root)
        run: |
          mkdir -p out
          cp -r projects/supporting_materials/web_dinamica/final/* out/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
